<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glowing connection lines -->
  <line x1="20" y1="50" x2="50" y2="20" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="50" x2="50" y2="80" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="20" x2="80" y2="50" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="80" x2="80" y2="50" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="#a78bfa" stroke-width="4" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.8"/>
  <line x1="50" y1="20" x2="50" y2="80" stroke="#a78bfa" stroke-width="4" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.8"/>

  <!-- Glowing outer ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#g1)" stroke-width="3" opacity="0.8"/>

  <!-- Connected Nodes (Circles) -->
  <!-- Center hub -->
  <circle cx="50" cy="50" r="12" fill="#1e1b4b" stroke="#a78bfa" stroke-width="4"/>
  <circle cx="50" cy="50" r="6" fill="#f43f5e"/> <!-- anomaly/alert core -->

  <!-- Top host -->
  <circle cx="50" cy="20" r="9" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="50" cy="20" r="4" fill="#60a5fa"/>

  <!-- Left host -->
  <circle cx="20" cy="50" r="9" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="20" cy="50" r="4" fill="#60a5fa"/>

  <!-- Bottom host -->
  <circle cx="50" cy="80" r="9" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="50" cy="80" r="4" fill="#60a5fa"/>

  <!-- Right host -->
  <circle cx="80" cy="50" r="9" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="80" cy="50" r="4" fill="#60a5fa"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
</svg>